services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tracer
      POSTGRES_USER: tracer
      POSTGRES_PASSWORD: tracer
    ports:
      # Host 5432 is already in use locally; map to 5433 (DATABASE_URL points here).
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tracer']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
