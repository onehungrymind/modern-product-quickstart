apiVersion: 1

groups:
  - orgId: 1
    name: tracer-api-slo
    folder: SLO Alerts
    interval: 1m
    rules:
      - uid: tracer-redirect-p99-slo-burn
        title: "Redirect p99 SLO burn"
        condition: C
        for: 1m
        annotations:
          summary: "Redirect p99 latency is breaching the 100 ms SLO"
          description: >
            The 99th-percentile redirect latency has exceeded 100 ms for at least 1 minute.
            SLO: p99 < 100 ms. Check for slow DB queries, cold starts, or synthetic
            SLO_BURN_DELAY_MS injection.
        labels:
          severity: critical
          slo: redirect-latency-p99
        data:
          - refId: A
            datasourceUid: prometheus
            queryType: ""
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              expr: >
                histogram_quantile(0.99, sum by (le) (rate(tracer_redirect_duration_ms_milliseconds_bucket[1m])))
              intervalMs: 1000
              maxDataPoints: 43200
              instant: false
              range: true
          - refId: C
            datasourceUid: "__expr__"
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: C
              type: threshold
              conditions:
                - evaluator:
                    params:
                      - 100
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
