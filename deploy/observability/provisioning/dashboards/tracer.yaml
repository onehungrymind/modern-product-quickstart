apiVersion: 1

providers:
  - name: tracer
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      # This path is inside the lgtm container (mounted from ./observability/dashboards on host).
      path: /otel-lgtm/grafana/dashboards
