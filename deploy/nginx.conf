server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The SPA's API calls are proxied to the API container, reachable as `api` on the
  # Docker network (Terraform gives the API container an `api` network alias). Using
  # a variable + the Docker embedded DNS resolver (127.0.0.11) defers name resolution
  # to request time, so nginx still starts when the API isn't up yet.
  location /api/ {
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $tracer_api http://api:3000;
    proxy_pass $tracer_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback — client-side routes resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
